services:
  postgres:
    image: postgres:16-alpine
    # container_name: parcel-flow-db # Removed to avoid conflicts in Coolify previews
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parcelflow}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    # ports:
    #   - "5432:5432" # Removed static port binding for Coolify preview
    networks:
      - parcelflow-net
    # volumes:
    #   - postgres_data:/var/lib/postgresql/data # Commented out for ephemeral preview DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-parcelflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: parcel-flow-backend # Removed to avoid conflicts in Coolify previews
    # ports:
    #   - "8080:8080" # Removed static port binding for Coolify preview
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-parcelflow}
      - PGUSER=${POSTGRES_USER:-user}
      - PGPASSWORD=${POSTGRES_PASSWORD:-password}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - SECURITY_API_KEY=${SECURITY_API_KEY}
    networks:
      - parcelflow-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
    # container_name: parcel-flow-frontend # Removed to avoid conflicts in Coolify previews
    networks:
      - parcelflow-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend

networks:
  parcelflow-net:
    driver: bridge

